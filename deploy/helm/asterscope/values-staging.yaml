# AsterScope Helm Values — Staging Overrides

replicaCount:
  api: 1
  retrieval: 1

autoscaling:
  api:
    enabled: false
  retrieval:
    enabled: false

resources:
  api:
    requests:
      cpu: 250m
      memory: 512Mi
    limits:
      cpu: 1000m
      memory: 2Gi
  retrieval:
    requests:
      cpu: 500m
      memory: 1Gi
    limits:
      cpu: 2000m
      memory: 4Gi

externalSecrets:
  secretStoreRef:
    name: aws-secrets-manager-staging

env:
  API_ENV: staging
  LOG_LEVEL: INFO

