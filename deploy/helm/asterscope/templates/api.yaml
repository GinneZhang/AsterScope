apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "asterscope.componentName" (dict "root" . "component" "api") }}
  labels:
    {{- include "asterscope.labels" . | nindent 4 }}
    app.kubernetes.io/component: api
spec:
  replicas: {{ .Values.replicaCount.api }}
  selector:
    matchLabels:
      {{- include "asterscope.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: api
  template:
    metadata:
      labels:
        {{- include "asterscope.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: api
    spec:
      containers:
        - name: api
          image: "{{ .Values.image.api.repository }}:{{ .Values.image.api.tag }}"
          imagePullPolicy: {{ .Values.image.api.pullPolicy }}
          ports:
            - containerPort: {{ .Values.service.api.port }}
          envFrom:
            - secretRef:
                name: {{ include "asterscope.secretName" . }}
          livenessProbe:
            httpGet:
              path: /health
              port: {{ .Values.service.api.port }}
            initialDelaySeconds: {{ .Values.probes.api.liveness.initialDelaySeconds }}
            periodSeconds: {{ .Values.probes.api.liveness.periodSeconds }}
            timeoutSeconds: {{ .Values.probes.api.liveness.timeoutSeconds }}
            failureThreshold: {{ .Values.probes.api.liveness.failureThreshold }}
          readinessProbe:
            httpGet:
              path: /health
              port: {{ .Values.service.api.port }}
            initialDelaySeconds: {{ .Values.probes.api.readiness.initialDelaySeconds }}
            periodSeconds: {{ .Values.probes.api.readiness.periodSeconds }}
            timeoutSeconds: {{ .Values.probes.api.readiness.timeoutSeconds }}
            failureThreshold: {{ .Values.probes.api.readiness.failureThreshold }}
          resources:
            {{- toYaml .Values.resources.api | nindent 12 }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "asterscope.componentName" (dict "root" . "component" "api") }}
  labels:
    {{- include "asterscope.labels" . | nindent 4 }}
    app.kubernetes.io/component: api
spec:
  type: {{ .Values.service.api.type }}
  ports:
    - port: {{ .Values.service.api.port }}
      targetPort: {{ .Values.service.api.port }}
      protocol: TCP
  selector:
    {{- include "asterscope.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: api
---
{{- if .Values.autoscaling.api.enabled }}
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: {{ include "asterscope.componentName" (dict "root" . "component" "api-hpa") }}
  labels:
    {{- include "asterscope.labels" . | nindent 4 }}
    app.kubernetes.io/component: api
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: {{ include "asterscope.componentName" (dict "root" . "component" "api") }}
  minReplicas: {{ .Values.autoscaling.api.minReplicas }}
  maxReplicas: {{ .Values.autoscaling.api.maxReplicas }}
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: {{ .Values.autoscaling.api.targetCPUUtilization }}
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: {{ .Values.autoscaling.api.targetMemoryUtilization }}
{{- end }}
